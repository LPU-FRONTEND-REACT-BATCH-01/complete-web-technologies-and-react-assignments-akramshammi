<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <style>
        body{
            margin: 0;
        }

        .navbar{
            background-color: black;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        .navbar ul{
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .navbar li{
            margin-right: 25px;
        }

        .navbar a{
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .navbar a:hover{
            color: yellow;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

</body>
</html>
