<!DOCTYPE html>
<html>
<head>
    <title>Hotel Booking</title>
</head>
<body>

    <h1>Hotel Booking Form</h1>

    <form >
        <table border="1" cellpadding="10">

            <tr>
                <td>Username</td>
                <td><input placeholder="username" type="text" name="username" required></td>
            </tr>

            <tr>
                <td>Email ID</td>
                <td><input placeholder="email id" type="email" name="email" required></td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td><input placeholder="phone" type="tel" name="phone" required></td>
            </tr>

            <tr>
                <td>Check-in Date</td>
                <td><input type="date" name="checkin" required></td>
            </tr>

            <tr>
                <td>Check-out Date</td>
                <td><input type="date" name="checkout" required></td>
            </tr>

            <tr>
                <td>Room Type</td>
                <td>
                    <select name="room">
                        <option>Single</option>
                        <option>Double</option>
                        <option>Deluxe</option>
                        <option>Suite</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="center">
                    <input type="submit" value="Submit">
                </td>
                <td align="center">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
